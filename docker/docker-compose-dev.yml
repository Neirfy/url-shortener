services:
  shorten_api:
    container_name: shorten_api
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    command: poetry run uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir src
    restart: on-failure
    env_file:
      - .env
    ports:
      - 8000:8000
    depends_on:
      - shorten_postgres

  shorten_postgres:
    image: postgres:13.8-bullseye
    container_name: shorten_postgres
    restart: on-failure

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - shorten_db:/var/lib/postgresql/data
    ports:
      - "5256:5432"
    env_file:
      - .env

volumes:
  shorten_db:
    name: shorten_postgres
